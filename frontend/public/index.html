<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- Proper mobile viewport: no zoom on input focus, full width -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="description" content="StoriesOfUs - A platform for sharing real-life experiences related to social issues" />
    <!-- iOS PWA / Safari meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="StoriesOfUs" />
    <!-- Prevent phone number detection -->
    <meta name="format-detection" content="telephone=no" />
    <title>StoriesOfUs - Social Issue Storytelling</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      /* Prevent iOS auto-zoom on input focus (font-size must be >= 16px) */
      input, textarea, select { font-size: 16px !important; }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
